name: Build and publish advisory feeds

on:
  schedule:
    - cron: "0 * * * *"  # hourly
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "feeds.txt"
      - "scripts/**"
      - ".github/workflows/build-feeds.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pandoc
        uses: pandoc/actions/setup@v1

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build feeds
        run: |
          ./scripts/build-all.sh site feeds.txt "${{ steps.pages.outputs.base_url }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
